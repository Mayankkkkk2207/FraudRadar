services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: fraudradar-zookeeper
    restart: unless-stopped
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
      ZOOKEEPER_4LW_COMMANDS_WHITELIST: srvr,stat
    ports:
      - "2181:2181"
    healthcheck:
      test: ["CMD-SHELL", "echo srvr | nc -w 2 localhost 2181 | grep 'Mode:'"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: fraudradar-kafka
    restart: unless-stopped
    depends_on:
      zookeeper:
        condition: service_started
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: ${KAFKA_BROKER_ID}
      KAFKA_ZOOKEEPER_CONNECT: ${KAFKA_ZOOKEEPER_CONNECT}
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:29092,PLAINTEXT_HOST://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://${KAFKA_HOST}:29092,PLAINTEXT_HOST://${KAFKA_EXTERNAL_HOST}:9092
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_CONFLUENT_SUPPORT_METRICS_ENABLE: "false"
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions --bootstrap-server localhost:9092 >/dev/null 2>&1"]
      interval: 10s
      timeout: 10s
      retries: 18
      start_period: 45s

  kafka-init:
    image: confluentinc/cp-kafka:7.5.0
    container_name: fraudradar-kafka-init
    env_file:
      - .env
    depends_on:
      kafka:
        condition: service_healthy
    restart: "no"
    command:
      - bash
      - -c
      - |
        set -e
        kafka-topics --bootstrap-server "$${KAFKA_BOOTSTRAP_SERVERS}" --create --if-not-exists --topic "$${KAFKA_RAW_TOPIC}" --partitions "$${KAFKA_TOPIC_PARTITIONS}" --replication-factor "$${KAFKA_TOPIC_REPLICATION_FACTOR}"
        kafka-topics --bootstrap-server "$${KAFKA_BOOTSTRAP_SERVERS}" --create --if-not-exists --topic "$${KAFKA_SCORED_TOPIC}" --partitions "$${KAFKA_TOPIC_PARTITIONS}" --replication-factor "$${KAFKA_TOPIC_REPLICATION_FACTOR}"
        kafka-topics --bootstrap-server "$${KAFKA_BOOTSTRAP_SERVERS}" --list

  postgres:
    image: postgres:15-alpine
    container_name: fraudradar-postgres
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

  redis:
    image: redis:7-alpine
    container_name: fraudradar-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 10s

  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    container_name: fraudradar-api
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      kafka-init:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8000:8000"
    volumes:
      - ./models:/app/models
      - ./data:/app/data
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=3).read()\""]
      interval: 15s
      timeout: 5s
      retries: 12
      start_period: 60s

  producer:
    build:
      context: .
      dockerfile: producer/Dockerfile
    container_name: fraudradar-producer
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      kafka-init:
        condition: service_completed_successfully
    volumes:
      - ./data:/app/data
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import os; from kafka import KafkaProducer; p=KafkaProducer(bootstrap_servers=os.environ['KAFKA_BOOTSTRAP_SERVERS'].split(','), request_timeout_ms=5000, api_version_auto_timeout_ms=5000); assert p.bootstrap_connected(); p.close()\""]
      interval: 30s
      timeout: 10s
      retries: 6
      start_period: 60s

  consumer:
    build:
      context: .
      dockerfile: consumer/Dockerfile
    container_name: fraudradar-consumer
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      kafka-init:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "9101:9101"
    volumes:
      - ./models:/app/models
      - ./data:/app/data
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:9101/metrics', timeout=3).read()\""]
      interval: 15s
      timeout: 5s
      retries: 12
      start_period: 60s

  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: fraudradar-prometheus
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
      consumer:
        condition: service_healthy
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --web.enable-lifecycle
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:9090/-/healthy"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s

  grafana:
    image: grafana/grafana:11.2.2
    container_name: fraudradar-grafana
    restart: unless-stopped
    depends_on:
      prometheus:
        condition: service_healthy
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
      GF_USERS_ALLOW_SIGN_UP: ${GRAFANA_ALLOW_SIGN_UP}
    ports:
      - "3000:3000"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:3000/api/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s

volumes:
  postgres-data:
  redis-data:
  prometheus-data:
  grafana-data:
